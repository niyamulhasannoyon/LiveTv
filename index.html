<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans">

  <!-- Header -->

    <div class="flex items-center gap-3">
      <div class="h-4 w-4 rounded-full bg-red-600 animate-pulse"></div>
      <h1 class="text-xl font-bold tracking-tight">Live TV Dashboard</h1>
    </div>
    <span id="current-channel-title" class="text-zinc-400 font-medium text-sm">Select a channel to begin watching</span>
  </header>

  <!-- Main Container -->

    <!-- Player Section -->
    <div class="flex-1 bg-black flex items-center justify-center p-4 relative aspect-video md:aspect-auto">
      <video id="video" class="w-full max-h-[80vh] bg-black rounded-lg shadow-2xl" controls autoplay playsinline></video>
      <div id="player-error" class="hidden absolute inset-0 bg-zinc-900/90 flex flex-col items-center justify-center p-6 text-center">
        <p class="text-red-400 font-semibold mb-2">Stream Offline or Blocked</p>
        <p class="text-xs text-zinc-500 max-w-sm">This link might be geo-restricted, expired, or blocking browser playback via CORS policies.</p>
      </div>
    </div>

    <!-- Sidebar Channel List -->
    <div class="w-full md:w-80 bg-zinc-900 border-t md:border-t-0 md:border-l border-zinc-800 flex flex-col h-[50vh] md:h-auto">
      <div class="p-4 border-b border-zinc-800 bg-zinc-900/50">
        <p class="text-xs font-semibold text-zinc-400 tracking-wider uppercase">Channels</p>
      </div>
      <div id="channel-list" class="flex-1 overflow-y-auto p-2 space-y-1">
        <!-- Javascript injections happen here -->
      </div>
    </div>
  </main>

    // Fast inline M3U custom parser
    function parseM3U(data) {
      const lines = data.split('\n');
      const channels = [];
      let currentChannel = null;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (line.startsWith('#EXTINF:')) {
          currentChannel = {};
          
          // Match standard logo attribute
          const logoMatch = line.match(/tvg-logo="([^"]+)"/);
          currentChannel.logo = logoMatch ? logoMatch[1] : 'https://placehold.co/40x40/27272a/a1a1aa?text=TV';
          
          // Grab stream raw text node name
          const commaIndex = line.lastIndexOf(',');
          currentChannel.name = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : 'Unknown Channel';
        } else if (line.startsWith('http')) {
          if (currentChannel) {
            currentChannel.url = line;
            channels.push(currentChannel);
            currentChannel = null;
          }
        }
      }
      return channels;
    }

    const video = document.getElementById('video');
    const errorOverlay = document.getElementById('player-error');
    const channelListContainer = document.getElementById('channel-list');
    const currentChannelTitle = document.getElementById('current-channel-title');
    let hls = null;

    // Stream playback executor
    function playStream(url, name) {
      errorOverlay.classList.add('hidden');
      currentChannelTitle.textContent = `Watching: ${name}`;

      // Reset active HLS instances
      if (hls) {
        hls.destroy();
      }

      if (Hls.isSupported()) {
        hls = new Hls({
          maxMaxBufferLength: 10,
          enableWorker: true
        });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            errorOverlay.classList.remove('hidden');
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Fallback implementation for native browsers like Safari
        video.src = url;
        video.addEventListener('error', () => {
          errorOverlay.classList.remove('hidden');
        });
      }
    }

    // Build sidebar UI panel elements dynamically
    const channels = parseM3U(m3uData);
    channels.forEach(channel => {
      const btn = document.createElement('button');
      btn.className = "w-full flex items-center gap-3 p-2 rounded-md hover:bg-zinc-800 transition text-left group focus:outline-none focus:bg-zinc-800";
      btn.innerHTML = `
        <img src="${channel.logo}" alt="${channel.name}" class="w-9 h-9 object-contain rounded bg-zinc-800 border border-zinc-700/50 p-0.5 group-hover:border-zinc-500" onerror="this.src='https://placehold.co/40x40/27272a/a1a1aa?text=TV'">
        <span class="text-sm font-medium text-zinc-300 group-hover:text-white truncate">${channel.name}</span>
      `;
      btn.addEventListener('click', () => playStream(channel.url, channel.name));
      channelListContainer.appendChild(btn);
    });

    // Auto-boot up first channel if present
    if(channels.length > 0) {
      playStream(channels[0].url, channels[0].name);
    }
